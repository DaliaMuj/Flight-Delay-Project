name: Analyze Flight Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"   # la 6 ore

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pandas scikit-learn

      - name: Run analysis
        run: python analyze_flights.py

      - name: Commit processed data
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add flights_processed.csv
          git diff --cached --quiet || git commit -m "update processed data"
          git push
